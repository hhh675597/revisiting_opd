# Multi-Task On-Policy Distillation Training Configuration
# For training a single model on both AlfWorld and Math tasks

# Enable multi-task training
multitask:
  enable: true
  batching_mode: sequential  # "sequential" or "mixed"
  
  tasks:
    # AlfWorld Task
    - name: alfworld
      env_name: alfworld/AlfredTWEnv
      ref_model_path: ~/models/alfworld-teacher-gigpo-qwen2.5-7b
      eval_dataset: eval_in_distribution
    
    # Math Task  
    - name: math
      env_name: math
      ref_model_path: ~/models/math-teacher-opd-qwen2.5-7b

# Data configuration
data:
  tokenizer: null
  use_shm: False
  train_files: ~/data/multitask_opd/train.parquet
  val_files: ~/data/multitask_opd/val.parquet
  prompt_key: prompt
  reward_fn_key: data_source
  max_prompt_length: 2048
  max_response_length: 512
  train_batch_size: 16
  val_batch_size: 128
  return_raw_input_ids: False
  return_raw_chat: True
  return_full_prompt: False
  shuffle: True
  filter_overlong_prompts: True
  filter_overlong_prompts_workers: 1
  truncation: error
  image_key: images
  video_key: videos
  trust_remote_code: False
  apply_chat_template_kwargs: {}
  batching_mode: sequential  # Must match multitask.batching_mode
  custom_cls:
    path: null
    name: null

# Actor/Rollout/Reference configuration
actor_rollout_ref:
  hybrid_engine: True
  model:
    path: ~/models/Qwen2.5-7B-Instruct
    use_shm: False
    external_lib: null
    override_config: {}
    enable_gradient_checkpointing: True
    enable_activation_offload: False
    use_remove_padding: True
    lora_rank: 0
    lora_alpha: 16
    target_modules: all-linear
    use_liger: False
    use_fused_kernels: False
    trust_remote_code: False
  
  actor:
    strategy: fsdp
    ppo_mini_batch_size: 256
    ppo_micro_batch_size: null
    ppo_micro_batch_size_per_gpu: 32
    use_dynamic_bsz: False
    ppo_max_token_len_per_gpu: 16384
    grad_clip: 1.0
    clip_ratio: 0.2
    clip_ratio_low: 0.2
    clip_ratio_high: 0.2
    clip_ratio_c: 3.0
    loss_agg_mode: "token-mean"
    entropy_coeff: 0.0
    use_invalid_action_penalty: False
    invalid_action_penalty_coef: 0.0
    use_kl_loss: True
    use_torch_compile: True
    kl_loss_coef: 0.0
    kl_loss_type: kl
    ppo_epochs: 1
    shuffle: False
    ulysses_sequence_parallel_size: 1
    policy_loss:
      loss_mode: "vanilla"
    checkpoint:
      contents: ['model', 'optimizer', 'extra']
    optim:
      lr: 1e-6
      lr_warmup_steps: -1
      lr_warmup_steps_ratio: 0.
      min_lr_ratio: 0.0
      num_cycles: 0.5
      warmup_style: constant
      total_training_steps: -1
      weight_decay: 0.01
    fsdp_config:
      wrap_policy:
        min_num_params: 0
      param_offload: False
      optimizer_offload: False
      offload_policy: False
      reshard_after_forward: True
      fsdp_size: -1
  
  ref:
    model:
      path: null  # Will be set per-task in multitask.tasks
      trust_remote_code: False
    strategy: fsdp
    fsdp_config:
      param_offload: True
      reshard_after_forward: True
      wrap_policy:
        min_num_params: 0
    use_torch_compile: True
    log_prob_micro_batch_size: null
    log_prob_micro_batch_size_per_gpu: 32
    log_prob_use_dynamic_bsz: False
    log_prob_max_token_len_per_gpu: 16384
    ulysses_sequence_parallel_size: 1
  
  rollout:
    name: vllm
    mode: sync
    chat_scheduler: null
    temperature: 1.0
    top_k: -1
    top_p: 1
    use_fire_sampling: False
    prompt_length: 2048
    response_length: 512
    dtype: bfloat16
    gpu_memory_utilization: 0.6
    ignore_eos: False
    enforce_eager: False
    free_cache_engine: False
    load_format: dummy_dtensor
    layered_summon: False
    tensor_model_parallel_size: 4
    max_num_batched_tokens: 8192
    max_model_len: null
    max_num_seqs: 1024
    log_prob_micro_batch_size: null
    log_prob_micro_batch_size_per_gpu: 32
    log_prob_use_dynamic_bsz: False
    log_prob_max_token_len_per_gpu: 16384
    disable_log_stats: True
    enable_chunked_prefill: False
    do_sample: True
    n: 1
    engine_kwargs:
      vllm:
        swap_space: null
      sglang:
        attention_backend: null
    val_kwargs:
      top_k: -1
      top_p: 1.0
      temperature: 0.4
      n: 1
      do_sample: True
    multi_turn:
      enable: False
      max_turns: null
      tool_config_path: null
      format: chatml

# Critic (not used for OPD)
critic:
  rollout_n: 1
  strategy: fsdp
  optim:
    lr: 1e-5
    lr_warmup_steps_ratio: 0.
    min_lr_ratio: null
    warmup_style: constant
    total_training_steps: -1
    weight_decay: 0.01
  model:
    path: ~/models/Qwen2.5-7B-Instruct
    use_shm: False
    tokenizer_path: null
    override_config: {}
    external_lib: null
    enable_gradient_checkpointing: True
    enable_activation_offload: False
    use_remove_padding: False
    trust_remote_code: False
    fsdp_config:
      param_offload: False
      optimizer_offload: False
      offload_policy: False
      reshard_after_forward: True
      wrap_policy:
        min_num_params: 0
      fsdp_size: -1
    lora_rank: 0
    lora_alpha: 16
    target_modules: all-linear
  ppo_mini_batch_size: 256
  ppo_micro_batch_size: null
  ppo_micro_batch_size_per_gpu: 32
  forward_micro_batch_size: null
  forward_micro_batch_size_per_gpu: null
  use_dynamic_bsz: False
  ppo_max_token_len_per_gpu: 32768
  forward_max_token_len_per_gpu: null
  ulysses_sequence_parallel_size: 1
  ppo_epochs: 1
  shuffle: False
  grad_clip: 1.0
  cliprange_value: 0.5
  loss_agg_mode: "token-mean"
  checkpoint:
    contents: ['model', 'optimizer', 'extra']

# Reward model (not used for environment-based training)
reward_model:
  enable: False

# Algorithm configuration (OPD)
algorithm:
  gamma: 0.0
  lam: 1.0
  adv_estimator: opd
  norm_adv_by_std_in_grpo: True
  use_kl_in_reward: True
  kl_penalty: kl
  kl_ctrl:
    type: fixed
    kl_coef: 0.001
    horizon: 10000
    target_kl: 0.1
  use_pf_ppo: False
  pf_ppo:
    reweight_method: pow
    weight_pow: 2.0
  gigpo:
    step_advantage_w: 1.0
    mode: "mean_norm"
    enable_similarity: False
    similarity_thresh: 0.95
  filter_groups:
    enable: False
    max_num_gen_batches: 10
  opd:
    gamma: 0.0
    reward_weight: 0.0

# Trainer configuration
trainer:
  balance_batch: True
  total_epochs: 150
  total_training_steps: null
  project_name: multitask_opd
  experiment_name: alfworld-math-opd
  logger: ['console', 'mlflow']
  log_val_generations: 0
  rollout_data_dir: null
  validation_data_dir: null
  nnodes: 1
  n_gpus_per_node: 8
  save_freq: 10
  resume_mode: auto
  resume_from_path: null
  val_before_train: True
  val_only: False
  test_freq: 5
  critic_warmup: 0
  default_hdfs_dir: null
  del_local_ckpt_after_load: False
  default_local_dir: checkpoints/multitask_opd
  max_actor_ckpt_to_keep: null
  max_critic_ckpt_to_keep: null
  ray_wait_register_center_timeout: 300
  device: cuda

# Ray initialization
ray_init:
  num_cpus: 96

# Environment configuration
env:
  env_name: multitask  # Special flag for multi-task training
  seed: 0
  max_steps: 50
  history_length: 2
  resources_per_worker:
    num_cpus: 0.1
    num_gpus: 0
  rollout:
    n: 8  # Group size for parallel environments
  alfworld:
    eval_dataset: eval_in_distribution
  search:
    log_requests: false
    search_url: "http://127.0.0.1:8000/retrieve"
    topk: 3
    timeout: 60
  sokoban:
    dim_room: [6, 6]
    num_boxes: 1
    search_depth: 30
    mode: tiny_rgb_array
  webshop:
    use_small: True
    human_goals: False

# Custom reward function (not used)
custom_reward_function:
  path: null
  name: compute_score
